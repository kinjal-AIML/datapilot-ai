<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="char" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A4A4A"/>
      <stop offset="100%" stop-color="#2A2A2A"/>
    </linearGradient>
  </defs>
  <rect x="40" y="60" width="120" height="90" rx="14" fill="url(#char)"/>
  <rect x="48" y="68" width="104" height="74" rx="10" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <!-- Charcoal texture dots -->
  <circle cx="65" cy="85" r="2" fill="white" opacity="0.08"/>
  <circle cx="90" cy="78" r="1.5" fill="white" opacity="0.06"/>
  <circle cx="130" cy="90" r="2.5" fill="white" opacity="0.07"/>
  <circle cx="110" cy="120" r="1.5" fill="white" opacity="0.05"/>
  <circle cx="75" cy="115" r="2" fill="white" opacity="0.06"/>
  <circle cx="140" cy="110" r="1" fill="white" opacity="0.08"/>
  <!-- Eucalyptus leaf -->
  <ellipse cx="100" cy="50" rx="8" ry="18" fill="#5C8A5C" opacity="0.7" transform="rotate(-15 100 50)"/>
  <line x1="100" y1="38" x2="100" y2="62" stroke="#4A7A4A" stroke-width="0.8"/>
  <ellipse cx="115" cy="45" rx="7" ry="15" fill="#5C8A5C" opacity="0.5" transform="rotate(20 115 45)"/>
  <!-- Label -->
  <text x="100" y="112" text-anchor="middle" font-family="serif" font-size="10" fill="white" opacity="0.7">CHARCOAL</text>
  <ellipse cx="100" cy="160" rx="55" ry="8" fill="#3A3A3A" opacity="0.06"/>
</svg>
