<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ros" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2D5D5"/>
      <stop offset="100%" stop-color="#E0AAAA"/>
    </linearGradient>
  </defs>
  <rect x="40" y="60" width="120" height="90" rx="14" fill="url(#ros)"/>
  <rect x="48" y="68" width="104" height="74" rx="10" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
  <!-- Rose -->
  <circle cx="100" cy="45" r="12" fill="#D4858F" opacity="0.8"/>
  <circle cx="100" cy="45" r="8" fill="#C96B77" opacity="0.7"/>
  <circle cx="100" cy="45" r="4" fill="#B8525E" opacity="0.8"/>
  <!-- Petals -->
  <ellipse cx="88" cy="42" rx="6" ry="9" fill="#D4858F" opacity="0.5" transform="rotate(-30 88 42)"/>
  <ellipse cx="112" cy="42" rx="6" ry="9" fill="#D4858F" opacity="0.5" transform="rotate(30 112 42)"/>
  <ellipse cx="95" cy="52" rx="5" ry="8" fill="#D4858F" opacity="0.4" transform="rotate(15 95 52)"/>
  <!-- Label -->
  <text x="100" y="112" text-anchor="middle" font-family="serif" font-size="11" fill="#8B4A52" opacity="0.7">ROSE PETAL</text>
  <ellipse cx="100" cy="160" rx="55" ry="8" fill="#3A3A3A" opacity="0.06"/>
</svg>
